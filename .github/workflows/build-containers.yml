name: Build Containers

on:
  pull_request:
    paths:
      - '.github/workflows/build-containers.yml'
      - 'docker/**'
      - 'src/**'
      - 'frontend/**'
      - 'pyproject.toml'
      - 'uv.lock'
  push:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/build-containers.yml'
      - 'docker/**'
      - 'src/**'
      - 'frontend/**'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: chatguru-agent
            dockerfile: docker/Dockerfile
          - image_name: vector-db
            dockerfile: docker/Dockerfile.db
          - image_name: mongo-vector-db
            dockerfile: docker/Dockerfile.mongodb
          - image_name: frontend
            dockerfile: docker/Dockerfile.frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image_name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          load: false
          tags: chatguru/${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}
