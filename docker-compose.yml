# chatguru Agent - Docker Compose
# Runs the FastAPI backend with WebSocket streaming and separate vector database.
#
# Usage:
#   MongoDB (default): docker compose up
#   SQLite:            docker compose --profile sqlite up
#   + Rate Limiting:   add --profile rate-limiting to either command above
#                      and set RATE_LIMIT_ENABLED=true in .env
#
# Examples:
#   docker compose --profile rate-limiting up
#   docker compose --profile sqlite --profile rate-limiting up

services:
  # --------------------------------------------------------------------------
  # Vector Database Service (sqlite-vec) - Use with --profile sqlite
  # --------------------------------------------------------------------------
  vector-db:
    profiles: [ "sqlite" ]
    build:
      context: .
      dockerfile: docker/Dockerfile.db
    ports:
      - "8001:8001"
    environment:
      # LLM settings for embeddings (see .cursorrules: endpoints use OPENAI_*,
      # credentials/model use LLM_*). OPENAI_EMBEDDINGS_ENDPOINT is optional
      # and falls back to OPENAI_ENDPOINT when empty.
      - OPENAI_ENDPOINT=${OPENAI_ENDPOINT}
      - OPENAI_EMBEDDINGS_ENDPOINT=${OPENAI_EMBEDDINGS_ENDPOINT:-}
      - OPENAI_EMBEDDINGS_API_KEY=${OPENAI_EMBEDDINGS_API_KEY:-}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_VERSION=${LLM_API_VERSION}
      - LLM_EMBEDDING_DEPLOYMENT_NAME=${LLM_EMBEDDING_DEPLOYMENT_NAME}
      # Same file as main app chat persistence (shared volume below)
      - VECTOR_SQLITE_DB_PATH=/data/chatguru.db
    volumes:
      - vector-db-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - chatguru-network

  # --------------------------------------------------------------------------
  # Redis (rate limiting backing store) - Use with --profile rate-limiting
  # --------------------------------------------------------------------------
  redis:
    profiles: [ "rate-limiting" ]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chatguru-network

  # --------------------------------------------------------------------------
  # Local MongoDB Atlas (with Vector Search support)
  # --------------------------------------------------------------------------
  mongodb:
    image: mongodb/mongodb-atlas-local:8.0
    hostname: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - mongodb-configdb-data:/data/configdb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "mongosh --eval \"db.hello().isWritablePrimary\" --quiet | grep -q true"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - chatguru-network

  # --------------------------------------------------------------------------
  # MongoDB Vector Database Service (API wrapper)
  # --------------------------------------------------------------------------
  mongo-vector-db:
    build:
      context: .
      dockerfile: docker/Dockerfile.mongodb
    ports:
      - "8002:8002"
    environment:
      # LLM settings for embeddings (see .cursorrules: endpoints use OPENAI_*,
      # credentials/model use LLM_*). OPENAI_EMBEDDINGS_ENDPOINT is optional
      # and falls back to OPENAI_ENDPOINT when empty.
      - LLM_OPENAI_BASE_URL=${LLM_OPENAI_BASE_URL:-}
      - OPENAI_ENDPOINT=${OPENAI_ENDPOINT}
      - OPENAI_EMBEDDINGS_ENDPOINT=${OPENAI_EMBEDDINGS_ENDPOINT:-}
      - OPENAI_EMBEDDINGS_API_KEY=${OPENAI_EMBEDDINGS_API_KEY:-}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_VERSION=${LLM_API_VERSION}
      - LLM_EMBEDDING_DEPLOYMENT_NAME=${LLM_EMBEDDING_DEPLOYMENT_NAME}
      # Local MongoDB settings
      - VECTOR_DB_MONGODB_URI=mongodb://mongodb:27017/?directConnection=true
      - VECTOR_DB_MONGODB_DATABASE=${VECTOR_DB_MONGODB_DATABASE:-products}
      - VECTOR_DB_MONGODB_COLLECTION=${VECTOR_DB_MONGODB_COLLECTION:-products}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8002/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - chatguru-network

  # --------------------------------------------------------------------------
  # Main Agent Service (MongoDB backend)
  # --------------------------------------------------------------------------
  chatguru-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # LLM Configuration (see .cursorrules: endpoints use OPENAI_*, model/keys use LLM_*)
      - OPENAI_ENDPOINT=${OPENAI_ENDPOINT}
      - OPENAI_EMBEDDINGS_ENDPOINT=${OPENAI_EMBEDDINGS_ENDPOINT:-}
      - OPENAI_EMBEDDINGS_API_KEY=${OPENAI_EMBEDDINGS_API_KEY:-}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_DEPLOYMENT_NAME=${LLM_DEPLOYMENT_NAME}
      - LLM_API_VERSION=${LLM_API_VERSION}
      - LLM_OPENAI_BASE_URL=${LLM_OPENAI_BASE_URL:-}
      - LLM_EMBEDDING_DEPLOYMENT_NAME=${LLM_EMBEDDING_DEPLOYMENT_NAME}

      # Langfuse Configuration (Observability & Tracing)
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST}

      # Vector Database Service
      - VECTOR_DB_TYPE=mongodb
      - VECTOR_DB_MONGODB_URL=http://mongo-vector-db:8002

      # Chat history persistence (optional).
      # Unset = disabled (stateless). Set to enable; migrations run automatically on startup.
      # For SQLite add a volume mount (e.g. chatguru-data:/data) and use:
      #   PERSISTENCE_DATABASE_URL=sqlite+aiosqlite:////data/chatguru.db
      # For PostgreSQL (external DB, no volume needed):
      #   PERSISTENCE_DATABASE_URL=postgresql+asyncpg://user:pass@host:5432/chatguru
      - PERSISTENCE_DATABASE_URL=${PERSISTENCE_DATABASE_URL:-}

      # Rate Limiting
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-false}
      - RATE_LIMIT_REDIS_URL=${RATE_LIMIT_REDIS_URL:-redis://redis:6379/0}
      - RATE_LIMIT_MAX_MESSAGES=${RATE_LIMIT_MAX_MESSAGES:-10}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-86400}
      - RATE_LIMIT_TRUST_PROXY=${RATE_LIMIT_TRUST_PROXY:-false}

      # Document RAG (startup ingestion from /app/rag_data when enabled)
      - DOCUMENT_RAG_ENABLED=${DOCUMENT_RAG_ENABLED:-false}
      - DOCUMENT_RAG_BACKEND=${DOCUMENT_RAG_BACKEND:-mongodb}
      - DOCUMENT_RAG_MONGODB_URI=mongodb://mongodb:27017/?directConnection=true
      - DOCUMENT_RAG_MONGODB_DATABASE=${DOCUMENT_RAG_MONGODB_DATABASE:-chatguru}
      - DOCUMENT_RAG_MONGODB_COLLECTION=${DOCUMENT_RAG_MONGODB_COLLECTION:-documents}
      - DOCUMENT_RAG_MONGODB_INDEX_NAME=${DOCUMENT_RAG_MONGODB_INDEX_NAME:-document_vector_index}
      - DOCUMENT_RAG_MONGODB_FILES_BUCKET=${DOCUMENT_RAG_MONGODB_FILES_BUCKET:-document_sources}
      - DOCUMENT_RAG_EMBEDDING_PROVIDER=${DOCUMENT_RAG_EMBEDDING_PROVIDER:-openai}
      - DOCUMENT_RAG_INGEST_FULL_REPLACE=${DOCUMENT_RAG_INGEST_FULL_REPLACE:-}

      # FastAPI Configuration
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8000

      # Application Configuration
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - APP_NAME=${APP_NAME:-chatguru Agent}

    depends_on:
      mongo-vector-db:
        condition: service_healthy
      mongodb:
        condition: service_healthy

    restart: unless-stopped

    volumes:
      - rag-ingest-state:/app/rag_ingest_state
      - chatguru-data:/data

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - chatguru-network

  # --------------------------------------------------------------------------
  # Main Agent Service (SQLite backend) - Use with --profile sqlite
  # --------------------------------------------------------------------------
  chatguru-agent-sqlite:
    profiles: [ "sqlite" ]
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # LLM Configuration (see .cursorrules: endpoints use OPENAI_*, model/keys use LLM_*)
      - OPENAI_ENDPOINT=${OPENAI_ENDPOINT}
      - OPENAI_EMBEDDINGS_ENDPOINT=${OPENAI_EMBEDDINGS_ENDPOINT:-}
      - OPENAI_EMBEDDINGS_API_KEY=${OPENAI_EMBEDDINGS_API_KEY:-}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_DEPLOYMENT_NAME=${LLM_DEPLOYMENT_NAME}
      - LLM_API_VERSION=${LLM_API_VERSION}
      - LLM_OPENAI_BASE_URL=${LLM_OPENAI_BASE_URL:-}
      - LLM_EMBEDDING_DEPLOYMENT_NAME=${LLM_EMBEDDING_DEPLOYMENT_NAME}

      # Langfuse Configuration (Observability & Tracing)
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST}

      # Vector Database Service
      - VECTOR_DB_TYPE=sqlite
      - VECTOR_DB_SQLITE_URL=http://vector-db:8001

      # Chat + Alembic (same SQLite file as vector-db service)
      - PERSISTENCE_DATABASE_URL=sqlite+aiosqlite:////data/chatguru.db

      # Rate Limiting
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-false}
      - RATE_LIMIT_REDIS_URL=${RATE_LIMIT_REDIS_URL:-redis://redis:6379/0}
      - RATE_LIMIT_MAX_MESSAGES=${RATE_LIMIT_MAX_MESSAGES:-10}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-86400}
      - RATE_LIMIT_TRUST_PROXY=${RATE_LIMIT_TRUST_PROXY:-false}

      # FastAPI Configuration
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8000

      # Application Configuration
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - APP_NAME=${APP_NAME:-chatguru Agent}

    depends_on:
      vector-db:
        condition: service_healthy

    restart: unless-stopped

    volumes:
      - vector-db-data:/data

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - chatguru-network

  # --------------------------------------------------------------------------
  # Frontend Service (React + nginx, production build)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - chatguru-agent
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - chatguru-network

# --------------------------------------------------------------------------
# Volumes
# --------------------------------------------------------------------------
volumes:
  chatguru-data:
    driver: local
  vector-db-data:
    driver: local
  mongodb-data:
    driver: local
  mongodb-configdb-data:
    driver: local
  redis-data:
    driver: local
  rag-ingest-state:
    driver: local

# --------------------------------------------------------------------------
# Network Configuration
# --------------------------------------------------------------------------
networks:
  chatguru-network:
    driver: bridge
