# Alembic — chat history schema (SQLAlchemy adapter).
# Run migrations: `make migrate` (requires PERSISTENCE_DATABASE_URL).
# This file lives inside the SQLAlchemy adapter package; the Makefile points here with -c.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = ../..
path_separator = os
version_path_separator = os

# Overridden in env.py from PERSISTENCE_DATABASE_URL / config.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
