<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chatguru Agent Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 24px;
            font-weight: 600;
        }

        .header-left {
            display: flex;
            align-items: center;
        }

        #clearButton {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #clearButton:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-left: 10px;
            background: #ff4444;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #44ff44;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message.assistant .message-bubble.streaming {
            background: #e8f4f8;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            border-color: #667eea;
        }

        #sendButton {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #sendButton:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #sendButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-left">
                chatguru Agent Chat
                <span class="status-indicator" id="statusIndicator"></span>
            </div>
            <button id="clearButton">Clear Chat</button>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="empty-state">Start a conversation by sending a message below.</div>
        </div>
        <div class="input-container">
            <input
                type="text"
                id="messageInput"
                placeholder="Type your message here..."
                autocomplete="off"
            />
            <button id="sendButton">Send</button>
        </div>
    </div>

    <script>
        let ws = null;
        let sessionId = null;
        let currentAssistantMessage = null;
        let conversationHistory = [];

        const STORAGE_KEY = 'chatguru_chat_history';
        const SESSION_KEY = 'chatguru_session_id';

        const statusIndicator = document.getElementById('statusIndicator');
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        // LocalStorage functions for conversation persistence
        function saveConversationHistory() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(conversationHistory));
                if (sessionId) {
                    localStorage.setItem(SESSION_KEY, sessionId);
                }
            } catch (e) {
                console.warn('Failed to save conversation history:', e);
            }
        }

        function loadConversationHistory() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    conversationHistory = JSON.parse(saved);
                }
                const savedSessionId = localStorage.getItem(SESSION_KEY);
                if (savedSessionId) {
                    sessionId = savedSessionId;
                }
            } catch (e) {
                console.warn('Failed to load conversation history:', e);
                conversationHistory = [];
            }
        }

        function clearConversationHistory() {
            conversationHistory = [];
            sessionId = null;
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(SESSION_KEY);
            messagesContainer.innerHTML = '<div class="empty-state">Start a conversation by sending a message below.</div>';
        }

        function restoreMessagesUI() {
            if (conversationHistory.length === 0) {
                return;
            }
            // Remove empty state
            const emptyState = messagesContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            // Restore all messages to UI
            for (const msg of conversationHistory) {
                const messageEl = createMessageElement(msg.role === 'user' ? 'user' : 'assistant', msg.content);
                messagesContainer.appendChild(messageEl);
            }
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket connected');
                statusIndicator.classList.add('connected');
                sendButton.disabled = false;
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                statusIndicator.classList.remove('connected');
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                statusIndicator.classList.remove('connected');
                sendButton.disabled = true;
                // Attempt to reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };
        }

        function handleWebSocketMessage(data) {
            if (data.type === 'token') {
                // Append token to current assistant message
                if (!currentAssistantMessage) {
                    currentAssistantMessage = createMessageElement('assistant', '', true);
                    messagesContainer.appendChild(currentAssistantMessage);
                    // Remove empty state if present
                    const emptyState = messagesContainer.querySelector('.empty-state');
                    if (emptyState) {
                        emptyState.remove();
                    }
                }
                const bubble = currentAssistantMessage.querySelector('.message-bubble');
                bubble.textContent += data.content;
                // Scroll to bottom
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            } else if (data.type === 'end') {
                // Mark message as complete and save to history
                let assistantContent = '';
                if (currentAssistantMessage) {
                    const bubble = currentAssistantMessage.querySelector('.message-bubble');
                    bubble.classList.remove('streaming');
                    assistantContent = bubble.textContent;
                    currentAssistantMessage = null;
                } else if (data.content) {
                    // Fallback: use end message content if no tokens were received
                    // (handles network issues where token events were missed)
                    const fallbackMessage = createMessageElement('assistant', data.content);
                    messagesContainer.appendChild(fallbackMessage);
                    assistantContent = data.content;
                }
                // Add assistant message to history
                if (assistantContent) {
                    conversationHistory.push({
                        role: 'assistant',
                        content: assistantContent
                    });
                }
                sessionId = data.session_id;
                saveConversationHistory();
                sendButton.disabled = false;
                messageInput.focus();
            } else if (data.type === 'error') {
                // Show error message
                if (currentAssistantMessage) {
                    currentAssistantMessage.remove();
                    currentAssistantMessage = null;
                }
                const errorMessage = createMessageElement('assistant', `Error: ${data.content}`);
                messagesContainer.appendChild(errorMessage);
                // Preserve session_id from error response for session continuity
                if (data.session_id && data.session_id !== 'unknown') {
                    sessionId = data.session_id;
                    saveConversationHistory();
                }
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        function createMessageElement(type, content, streaming = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const bubble = document.createElement('div');
            bubble.className = `message-bubble${streaming ? ' streaming' : ''}`;
            bubble.textContent = content;

            messageDiv.appendChild(bubble);
            return messageDiv;
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || !ws || ws.readyState !== WebSocket.OPEN) {
                return;
            }

            // Add user message to chat UI
            const userMessage = createMessageElement('user', message);
            messagesContainer.appendChild(userMessage);
            // Remove empty state if present
            const emptyState = messagesContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            // Add user message to history
            conversationHistory.push({
                role: 'user',
                content: message
            });
            saveConversationHistory();

            // Clear input and disable send button
            messageInput.value = '';
            sendButton.disabled = true;

            // Send message via WebSocket with conversation history
            const payload = {
                message: message,
                session_id: sessionId,
                messages: conversationHistory.slice(0, -1) // Send history without current message
            };
            ws.send(JSON.stringify(payload));

            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        document.getElementById('clearButton').addEventListener('click', clearConversationHistory);

        // Initialize on page load
        loadConversationHistory();
        restoreMessagesUI();
        connectWebSocket();
    </script>
</body>
</html>
