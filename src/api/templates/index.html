<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chatguru Agent Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 1100px;
            height: 90vh;
            display: flex;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: #1e1e2e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .sidebar-header h2 {
            color: white;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        #newChatButton {
            width: 100%;
            padding: 9px 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #newChatButton:hover {
            opacity: 0.85;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .conversation-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: #ccc;
            font-size: 13px;
            line-height: 1.4;
            transition: background 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-item:hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        .conversation-item.active {
            background: rgba(102, 126, 234, 0.35);
            color: white;
        }

        .conversation-item .conv-date {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        .conversation-item.active .conv-date {
            color: #aaa;
        }

        .conversations-empty {
            color: #555;
            font-size: 12px;
            text-align: center;
            padding: 20px 12px;
        }

        /* ── Chat panel ── */
        .chat-container {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: 600;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        #chatTitle {
            font-size: 15px;
            font-weight: 400;
            opacity: 0.85;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 320px;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            flex-shrink: 0;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #44ff44;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user { align-items: flex-end; }
        .message.assistant { align-items: flex-start; }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message.assistant .message-bubble.streaming {
            background: #e8f4f8;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        #messageInput:focus { border-color: #667eea; }

        #sendButton {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #sendButton:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #sendButton:disabled { opacity: 0.5; cursor: not-allowed; }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>chatguru</h2>
                <button id="newChatButton">+ New Conversation</button>
            </div>
            <div class="conversations-list" id="conversationsList">
                <div class="conversations-empty">No conversations yet.</div>
            </div>
        </div>

        <!-- Chat panel -->
        <div class="chat-container">
            <div class="chat-header">
                <div class="header-left">
                    <span class="status-indicator" id="statusIndicator"></span>
                    <span id="chatTitle">New conversation</span>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">Start a conversation by sending a message below.</div>
            </div>
            <div class="input-container">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="Type your message here..."
                    autocomplete="off"
                />
                <button id="sendButton">Send</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let sessionId = null;
        let visitorId = null;
        let currentAssistantMessage = null;
        let conversationHistory = [];
        let isFirstMessage = true;

        const SESSION_KEY = 'chatguru_session_id';
        const VISITOR_KEY = 'chatguru_visitor_id';

        const statusIndicator = document.getElementById('statusIndicator');
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const conversationsList = document.getElementById('conversationsList');
        const chatTitle = document.getElementById('chatTitle');

        // ── Identity ────────────────────────────────────────────────────────
        function loadVisitorId() {
            try {
                let id = localStorage.getItem(VISITOR_KEY);
                if (!id) {
                    id = crypto.randomUUID();
                    localStorage.setItem(VISITOR_KEY, id);
                }
                visitorId = id;
            } catch (e) {
                console.warn('Failed to load visitor id:', e);
                visitorId = crypto.randomUUID();
            }
        }

        function loadSessionId() {
            const saved = localStorage.getItem(SESSION_KEY);
            sessionId = saved || crypto.randomUUID();
            if (!saved) localStorage.setItem(SESSION_KEY, sessionId);
        }

        function saveSessionId() {
            try { localStorage.setItem(SESSION_KEY, sessionId); } catch (e) { /* ignore */ }
        }

        // ── Conversations sidebar ───────────────────────────────────────────
        async function loadConversations() {
            if (!visitorId) return;
            try {
                const res = await fetch(`/conversations?visitor_id=${encodeURIComponent(visitorId)}`);
                if (!res.ok) return;
                const convos = await res.json();
                renderConversationList(convos);
            } catch (e) {
                console.warn('Failed to load conversations:', e);
            }
        }

        function renderConversationList(convos) {
            conversationsList.innerHTML = '';
            if (convos.length === 0) {
                conversationsList.innerHTML = '<div class="conversations-empty">No conversations yet.</div>';
                return;
            }
            for (const c of convos) {
                const item = document.createElement('div');
                item.className = 'conversation-item' + (c.session_id === sessionId ? ' active' : '');
                item.dataset.sessionId = c.session_id;
                item.dataset.title = c.title;

                const titleEl = document.createElement('div');
                titleEl.textContent = c.title;

                const dateEl = document.createElement('div');
                dateEl.className = 'conv-date';
                dateEl.textContent = new Date(c.created_at).toLocaleDateString();

                item.appendChild(titleEl);
                item.appendChild(dateEl);
                item.addEventListener('click', () => switchConversation(c.session_id, c.title));
                conversationsList.appendChild(item);
            }
        }

        async function switchConversation(newSessionId, title) {
            if (newSessionId === sessionId) return;
            sessionId = newSessionId;
            saveSessionId();
            chatTitle.textContent = title;
            conversationHistory = [];
            await loadHistoryFromServer();
            updateActiveConversation();
        }

        function updateActiveConversation() {
            for (const item of conversationsList.querySelectorAll('.conversation-item')) {
                item.classList.toggle('active', item.dataset.sessionId === sessionId);
            }
        }

        function startNewConversation() {
            sessionId = crypto.randomUUID();
            saveSessionId();
            conversationHistory = [];
            isFirstMessage = true;
            chatTitle.textContent = 'New conversation';
            messagesContainer.innerHTML = '<div class="empty-state">Start a conversation by sending a message below.</div>';
            updateActiveConversation();
            messageInput.focus();
        }

        // ── Messages ────────────────────────────────────────────────────────
        async function loadHistoryFromServer() {
            if (!visitorId || !sessionId) return;
            try {
                const params = new URLSearchParams({ visitor_id: visitorId, session_id: sessionId });
                const res = await fetch(`/history?${params}`);
                if (!res.ok) return;
                const messages = await res.json();
                conversationHistory = messages;
                isFirstMessage = messages.length === 0;
                renderMessages();
            } catch (e) {
                console.warn('Failed to load history from server:', e);
            }
        }

        function renderMessages() {
            messagesContainer.innerHTML = '';
            if (conversationHistory.length === 0) {
                messagesContainer.innerHTML = '<div class="empty-state">Start a conversation by sending a message below.</div>';
                return;
            }
            for (const msg of conversationHistory) {
                const el = createMessageElement(msg.role === 'user' ? 'user' : 'assistant', msg.content);
                messagesContainer.appendChild(el);
            }
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function createMessageElement(type, content, streaming = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            const bubble = document.createElement('div');
            bubble.className = `message-bubble${streaming ? ' streaming' : ''}`;
            bubble.textContent = content;
            messageDiv.appendChild(bubble);
            return messageDiv;
        }

        // ── WebSocket ───────────────────────────────────────────────────────
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                statusIndicator.classList.add('connected');
                sendButton.disabled = false;
            };
            ws.onmessage = (event) => handleWebSocketMessage(JSON.parse(event.data));
            ws.onerror = () => statusIndicator.classList.remove('connected');
            ws.onclose = () => {
                statusIndicator.classList.remove('connected');
                sendButton.disabled = true;
                setTimeout(connectWebSocket, 3000);
            };
        }

        function handleWebSocketMessage(data) {
            if (data.type === 'token') {
                if (!currentAssistantMessage) {
                    currentAssistantMessage = createMessageElement('assistant', '', true);
                    messagesContainer.appendChild(currentAssistantMessage);
                    messagesContainer.querySelector('.empty-state')?.remove();
                }
                currentAssistantMessage.querySelector('.message-bubble').textContent += data.content;
                messagesContainer.scrollTop = messagesContainer.scrollHeight;

            } else if (data.type === 'end') {
                let assistantContent = '';
                if (currentAssistantMessage) {
                    const bubble = currentAssistantMessage.querySelector('.message-bubble');
                    bubble.classList.remove('streaming');
                    assistantContent = bubble.textContent;
                    currentAssistantMessage = null;
                } else if (data.content) {
                    messagesContainer.appendChild(createMessageElement('assistant', data.content));
                    assistantContent = data.content;
                }
                if (assistantContent) {
                    conversationHistory.push({ role: 'assistant', content: assistantContent });
                }
                if (data.session_id) {
                    sessionId = data.session_id;
                    saveSessionId();
                }
                // Refresh sidebar after first round-trip (title now exists in DB)
                if (isFirstMessage) {
                    isFirstMessage = false;
                    loadConversations();
                }
                sendButton.disabled = false;
                messageInput.focus();

            } else if (data.type === 'error') {
                if (currentAssistantMessage) {
                    currentAssistantMessage.remove();
                    currentAssistantMessage = null;
                }
                messagesContainer.appendChild(createMessageElement('assistant', `Error: ${data.content}`));
                if (data.session_id && data.session_id !== 'unknown') {
                    sessionId = data.session_id;
                    saveSessionId();
                }
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || !ws || ws.readyState !== WebSocket.OPEN) return;

            messagesContainer.appendChild(createMessageElement('user', message));
            messagesContainer.querySelector('.empty-state')?.remove();
            conversationHistory.push({ role: 'user', content: message });

            // Optimistically update the chat title on the first message
            if (isFirstMessage) {
                const derived = message.length > 60
                    ? message.slice(0, message.lastIndexOf(' ', 60) || 60) + '…'
                    : message;
                chatTitle.textContent = derived;
            }

            messageInput.value = '';
            sendButton.disabled = true;

            ws.send(JSON.stringify({
                session_id: sessionId,
                visitor_id: visitorId,
                messages: conversationHistory,
            }));

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // ── Init ─────────────────────────────────────────────────────────────
        document.getElementById('newChatButton').addEventListener('click', startNewConversation);
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        loadVisitorId();
        loadSessionId();
        Promise.all([loadHistoryFromServer(), loadConversations()]).then(() => connectWebSocket());
    </script>
</body>
</html>
