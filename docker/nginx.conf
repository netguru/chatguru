server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve .mjs files as JavaScript so the browser accepts them as ES modules.
    # Needed for the PDF.js worker (pdfjs-dist/build/pdf.worker.min.mjs).
    location ~* \.mjs$ {
        default_type application/javascript;
        try_files $uri =404;
    }

    # Proxy WebSocket connections to the backend.
    location /ws {
        proxy_pass http://chatguru-agent:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Proxy REST API routes to the backend.
    location ~ ^/(conversations|history|health|feedback) {
        proxy_pass http://chatguru-agent:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Document processing can be slow (Docling OCR/parsing) — use a longer timeout.
    location /process-document {
        proxy_pass http://chatguru-agent:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 25m;
    }

    # Raw image uploads — no heavy processing, short timeout, smaller body limit.
    location /upload-attachment {
        proxy_pass http://chatguru-agent:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 11m;
    }

    # Proxy document source downloads to the backend.
    location /documents/ {
        proxy_pass http://chatguru-agent:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy user attachment downloads/previews to the backend.
    location /attachments/ {
        proxy_pass http://chatguru-agent:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — unmatched paths serve index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
